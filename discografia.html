<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThisIsCris | Discografía</title>
    <style>
        body {
            margin: 0;
            padding: 50px 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            font-size: 2.5rem;
            color: #deff9a;
            margin-bottom: 50px;
            border-bottom: 2px solid #deff9a;
            padding-bottom: 10px;
        }
        .album-list {
            width: 100%;
            max-width: 800px;
            display: grid;
            gap: 20px;
        }
        .album-card {
            background: #1e293b;
            padding: 25px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s;
            border-left: 5px solid #deff9a;
        }
        .album-card:hover {
            transform: scale(1.02);
            background: #2d3748;
        }
        .info h2 {
            margin: 0;
            font-size: 1.5rem;
        }
        .info p {
            margin: 5px 0 0;
            color: #94a3b8;
            font-style: italic;
        }
        .btn {
            padding: 10px 20px;
            background-color: transparent;
            color: #deff9a;
            border: 2px solid #deff9a;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn:hover {
            background-color: #deff9a;
            color: #0f172a;
        }
        .back-home {
            margin-top: 40px;
            color: #94a3b8;
            text-decoration: none;
        }
        .back-home:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>DISCOGRAFÍA</h1>
    
    <div class="album-list">
        <!-- Item 1 -->
        <div class="album-card">
            <div class="info">
                <h2>CONCEPCIÓN</h2>
                <p>ThisIsCris, 4K2</p>
            </div>
            <a href="concepcion.html" class="btn">ESCUCHAR</a>
        </div>

        <!-- Item 2 -->
        <div class="album-card">
            <div class="info">
                <h2>Tal Día...</h2>
                <p>ThisIsCris</p>
            </div>
            <a href="taldia.html" class="btn">ESCUCHAR</a>
        </div>

        <!-- Item 3 -->
        <div class="album-card">
            <div class="info">
                <h2>Todo Es Feliz</h2>
                <p>ThisIsCris, MCx, 4K2</p>
            </div>
            <a href="todoesfeliz.html" class="btn">ESCUCHAR</a>
        </div>

        <!-- Item 4 -->
        <div class="album-card">
            <div class="info">
                <h2>Sin Destino Fijo</h2>
                <p>ThisIsCris</p>
            </div>
            <a href="sindestinofijo.html" class="btn">ESCUCHAR</a>
        </div>
    </div>

    <a href="home.html" class="back-home">← Volver al inicio</a>
</body>
</html>
